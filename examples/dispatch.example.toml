# Sample rules for `octo-notify dispatch`.
#
#   GITHUB_TOKEN=$(gh auth token) \
#     octo-notify dispatch --config dispatch.toml --state ~/.cache/octo-notify.json
#
# `match` selects how many rules fire per notification:
#   "first" - only the first matching rule (default)
#   "all"   - every matching rule
match = "first"

# Each [[rule]] has optional matchers (reason / subject_type / repo), a `run` command, and an
# optional `mark` (read | done) applied when the command exits 0. Omitted matchers match anything.
#
# In `run`, these placeholders are substituted, and the same values are exported as OCTO_* env
# vars (use $OCTO_TITLE etc. to avoid shell-quoting issues with untrusted text):
#   {repo} {thread_id} {title} {url} {reason} {type}

# Desktop-notify on @mentions.
[[rule]]
reason = "mention"
run = "notify-send 'GitHub mention' \"$OCTO_REPO: $OCTO_TITLE\""

# Log new issues and mark them read.
[[rule]]
subject_type = "Issue"
run = "echo \"$(date -u) {repo} {url}\" >> issues.log"
mark = "read"

# Catch-all (only reached under match = \"first\" when nothing above matched).
[[rule]]
run = "echo dispatched: [{reason}] {repo} - {title}"
